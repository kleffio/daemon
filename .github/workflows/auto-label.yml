name: Auto Label PR

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-label:
    name: Auto Label PR
    if: github.event_name == 'pull_request'
    uses: kleffio/.github/.github/workflows/_auto-label.yml@main
    with:
      unified_path: configs/labels.json
