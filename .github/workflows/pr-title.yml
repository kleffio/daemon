name: PR Title Check

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  pr-title:
    name: PR Title Check
    if: github.event_name == 'pull_request'
    uses: kleffio/.github/.github/workflows/_pr-title.yml@main
    with:
      unified_path: configs/labels.json
