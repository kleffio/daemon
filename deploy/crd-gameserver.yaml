apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: gameservers.kleff.io
spec:
  group: kleff.io
  names:
    kind: GameServer
    listKind: GameServerList
    plural: gameservers
    singular: gameserver
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                image:
                  type: string
                env:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      value:
                        type: string
                ports:
                  type: array
                  items:
                    type: object
                    properties:
                      containerPort:
                        type: integer
                      protocol:
                        type: string
                resources:
                  type: object
                  properties:
                    memoryBytes:
                      type: integer
                    cpuMillicores:
                      type: integer
